source = ~/.config/hypr/hyprlock-theme.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = /tmp/wall_0.png
    blur_passes = 3
}

animations {
    enabled = false
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%I:%M %p")</b>"
    color = rgba(180, 190, 254, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.3)
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(166, 173, 200, 1.0)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = hey brother
    color = rgba(205, 214, 244, 0.7)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 85
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = JetBrainsMono Nerd Font
    font_color = $font_color

    placeholder_text = Enter Password
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}
