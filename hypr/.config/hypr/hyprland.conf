# ═══════════════════════════════════════════════════════
#  hyprland.conf — homebase — clean arch, no omarchy
# ═══════════════════════════════════════════════════════

# ─── nvidia ───
env = NVD_BACKEND,direct
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# ─── monitors (triple 1080p) ───
monitor = DP-1, 1920x1080, 0x0, 1
monitor = HDMI-A-1, 1920x1080, 1920x0, 1
monitor = DP-2, 1920x1080, 3840x0, 1

workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2

# ─── autostart ───
exec-once = dbus-update-activation-environment --systemd --all
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = mako
exec-once = swww-daemon
exec-once = rclone mount gdrive: ~/google-drive --vfs-cache-mode writes &

# ─── cwal dynamic colors ───
source = ~/.cache/cwal/colors-hyprland.conf

$activeBorderColor = $color5 $background $background $color5 30deg
$inactiveBorderColor = $background $background $background $background 90deg

# ─── input ───
input {
    kb_layout = us
    kb_options = compose:caps
    repeat_rate = 40
    repeat_delay = 600
    numlock_by_default = true

    touchpad {
        scroll_factor = 0.4
        natural_scroll = false
        clickfinger_behavior = true
    }
}

# ─── look ───
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    layout = dwindle
    resize_on_border = true
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 6
    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000066)
        color_inactive = rgba(00000033)
    }

    blur {
        enabled = true
        size = 4
        passes = 4
        new_optimizations = true
        vibrancy = 0.3
        ignore_opacity = true
        popups = true
    }
}

layerrule = match:namespace waybar, blur 1
layerrule = match:namespace waybar, xray 0

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = easeOutBack, 0.34, 1.56, 0.64, 1
    bezier = sideDown, 0.3, 1, 0.7, 1
    bezier = ease, 0.25, 0.1, 0.25, 1.0

    animation = windowsIn, 1, 2.5, easeOutQuint, slide
    animation = windowsOut, 1, 2.5, sideDown, slide
    animation = windows, 1, 5.0, easeOutQuint
    animation = fadeIn, 1, 2.0, almostLinear
    animation = fadeOut, 1, 1.8, almostLinear
    animation = fade, 1, 2.8, quick
    animation = layers, 1, 4, ease, slidefade
    animation = layersOut, 1, 4, ease, slidefade
    animation = workspaces, 1, 2.0, easeInOutCubic, slide
    animation = workspacesIn, 1, 3.0, easeInOutCubic, slide
    animation = workspacesOut, 1, 3.0, easeInOutCubic, slide
    animation = specialWorkspace, 1, 3, quick, slidevert
}

dwindle {
    pseudotile = false
    preserve_split = true
    force_split = 2
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}

cursor {
    hide_on_key_press = true
}

# ─── window rules ───
windowrule = match:title scratchterm, float 1
windowrule = match:title scratchterm, size 70% 55%
windowrule = match:title scratchterm, center 1
windowrule = match:class (ghostty|com.mitchellh.ghostty), opacity 0.95 0.90
windowrule = match:class pavucontrol, float 1
windowrule = match:class (blueman-manager|.blueman-manager-wrapped), float 1
windowrule = match:title (Open File|Save File), float 1
windowrule = match:class 1Password, float 1
windowrule = match:class signal, float 1
windowrule = match:class dev.kloogans.hypr-snap, float 1
windowrule = match:class dev.kloogans.hypr-snap, center 1
windowrule = match:title Picture-in-Picture, float 1
windowrule = match:title Picture-in-Picture, pin 1
windowrule = match:class (Alacritty|kitty), scroll_touchpad 1.5
windowrule = match:class com.mitchellh.ghostty, scroll_touchpad 0.2

# ─── keybinds: apps ───
bindd = SUPER, RETURN, Terminal, exec, ghostty
bindd = SUPER, SPACE, Launcher, exec, fuzzel
bindd = SUPER SHIFT, B, Browser, exec, brave
bindd = SUPER SHIFT, F, File manager, exec, nautilus --new-window
bindd = SUPER SHIFT, N, Editor, exec, ghostty -e nvim
bindd = SUPER SHIFT, T, System monitor, exec, ghostty -e btop
bindd = SUPER SHIFT, D, Docker, exec, ghostty -e lazydocker
bindd = SUPER SHIFT, L, Claude Code, exec, env -u CLAUDECODE ghostty -e claude
bindd = SUPER SHIFT, M, Music, exec, spotify
bindd = SUPER SHIFT, SLASH, Passwords, exec, 1password
bindd = SUPER SHIFT, O, Obsidian, exec, obsidian --disable-gpu --enable-wayland-ime
bindd = SUPER SHIFT, G, Signal, exec, signal-desktop

# web apps
bindd = SUPER SHIFT, A, ChatGPT, exec, brave --app=https://chatgpt.com
bindd = SUPER SHIFT, C, Calendar, exec, brave --app=https://app.hey.com/calendar/weeks/
bindd = SUPER SHIFT, E, Email, exec, brave --app=https://app.hey.com
bindd = SUPER SHIFT, Y, YouTube, exec, brave --app=https://youtube.com/
bindd = SUPER SHIFT, X, X, exec, brave --app=https://x.com/
bindd = SUPER SHIFT, P, Google Photos, exec, brave --app=https://photos.google.com/

# control center
bindd = SUPER, grave, Control center, exec, /home/james/.local/bin/cc-toggle

# ─── keybinds: windows ───
bindd = SUPER, W, Close window, killactive
bindd = SUPER, F, Fullscreen, fullscreen, 0
bindd = SUPER, T, Float toggle, togglefloating
bindd = SUPER, J, Split toggle, togglesplit
bindd = SUPER, P, Pin window, pin

# focus
bindd = SUPER, left, Focus left, movefocus, l
bindd = SUPER, right, Focus right, movefocus, r
bindd = SUPER, up, Focus up, movefocus, u
bindd = SUPER, down, Focus down, movefocus, d
bindd = ALT, TAB, Cycle windows, cyclenext

# move windows
bindd = SUPER SHIFT, left, Move left, movewindow, l
bindd = SUPER SHIFT, right, Move right, movewindow, r
bindd = SUPER SHIFT, up, Move up, movewindow, u
bindd = SUPER SHIFT, down, Move down, movewindow, d

# resize
binde = SUPER, minus, resizeactive, -40 0
binde = SUPER, equal, resizeactive, 40 0
binde = SUPER SHIFT, minus, resizeactive, 0 -40
binde = SUPER SHIFT, equal, resizeactive, 0 40

# ─── keybinds: workspaces ───
bindd = SUPER, 1, Workspace 1, workspace, 1
bindd = SUPER, 2, Workspace 2, workspace, 2
bindd = SUPER, 3, Workspace 3, workspace, 3
bindd = SUPER, 4, Workspace 4, workspace, 4
bindd = SUPER, 5, Workspace 5, workspace, 5
bindd = SUPER, 6, Workspace 6, workspace, 6
bindd = SUPER, 7, Workspace 7, workspace, 7
bindd = SUPER, 8, Workspace 8, workspace, 8
bindd = SUPER, 9, Workspace 9, workspace, 9
bindd = SUPER, 0, Workspace 10, workspace, 10
bindd = SUPER, TAB, Next workspace, workspace, e+1

# move to workspace
bindd = SUPER SHIFT, 1, Move to 1, movetoworkspace, 1
bindd = SUPER SHIFT, 2, Move to 2, movetoworkspace, 2
bindd = SUPER SHIFT, 3, Move to 3, movetoworkspace, 3
bindd = SUPER SHIFT, 4, Move to 4, movetoworkspace, 4
bindd = SUPER SHIFT, 5, Move to 5, movetoworkspace, 5
bindd = SUPER SHIFT, 6, Move to 6, movetoworkspace, 6
bindd = SUPER SHIFT, 7, Move to 7, movetoworkspace, 7
bindd = SUPER SHIFT, 8, Move to 8, movetoworkspace, 8
bindd = SUPER SHIFT, 9, Move to 9, movetoworkspace, 9
bindd = SUPER SHIFT, 0, Move to 10, movetoworkspace, 10

binds {
    hide_special_on_workspace_change = true
}

# scratchpad
bindd = SUPER, S, Scratchpad, togglespecialworkspace, magic
bindd = SUPER ALT, S, Move to scratchpad, movetoworkspace, special:magic

# scratchpad terminal
bindd = SUPER, Z, Scratch terminal, exec, /home/james/.local/bin/scratchterm
bindd = SUPER, Escape, Close scratchpad, togglespecialworkspace, scratchterm

# mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = , mouse:274, exec, true

# ─── keybinds: media ───
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl = , XF86AudioMute, exec, pamixer -t
bindl = , XF86AudioMicMute, exec, pamixer --default-source -t
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause

# ─── keybinds: audio devices ───
bind = CONTROL_SUPER, 1, exec, wpctl set-default $(wpctl status | sed -n '/Sinks:/,/Sources:/p' | grep "Scarlett Solo" | grep -oE "[0-9]+" | head -n 1) && notify-send -t 2000 "Audio" "Output: Scarlett Solo"
bind = CONTROL_SUPER, 2, exec, wpctl set-default $(wpctl status | sed -n '/Sinks:/,/Sources:/p' | grep "WH-1000XM4" | grep -oE "[0-9]+" | head -n 1) && notify-send -t 2000 "Audio" "Output: Sony XM4"
bind = CONTROL_SUPER, 3, exec, wpctl set-default $(wpctl status | sed -n '/Sinks:/,/Sources:/p' | grep "AirPods" | grep -oE "[0-9]+" | head -n 1) && notify-send -t 2000 "Audio" "Output: AirPods"
bind = CONTROL_SUPER, 4, exec, wpctl set-mute $(wpctl status | sed -n '/Sources:/,/Filters:/p' | grep "Scarlett Solo" | grep -oE "[0-9]+" | head -n 1) toggle && notify-send -t 2000 "Microphone" "Mute Toggled"
bind = CONTROL_SUPER, 5, exec, wpctl set-default $(wpctl status | sed -n '/Sinks:/,/Sources:/p' | grep "AirPods" | grep -oE "[0-9]+" | head -n 1) && pactl set-card-profile $(pactl list cards short | grep "bluez_card" | grep "AirPods" | awk '{print $1}') headset-head-unit && notify-send -t 2000 "AirPods Mode" "High-Def Off | Microphone ON"

# ─── keybinds: utils ───
bindd = SUPER, ESCAPE, Power menu, exec, echo -e "lock\nlogout\nreboot\nshutdown" | fuzzel -d -p "power: " | xargs -I{} sh -c 'case {} in lock) hyprlock;; logout) hyprctl dispatch exit;; reboot) systemctl reboot;; shutdown) systemctl poweroff;; esac'
bindd = , PRINT, Screenshot region, exec, REGION=$(slurp) && sleep 0.15 && grim -g "$REGION" - | wl-copy
bindd = SHIFT, PRINT, Screenshot full, exec, grim - | wl-copy
bindd = SUPER, PRINT, Screen record toggle, exec, /home/james/.local/bin/screenrecord
bindd = SUPER, R, Record screen, exec, hypr-snap screen
bindd = SUPER SHIFT, R, Record region, exec, hypr-snap region
bindd = SUPER, PERIOD, Dismiss notification, exec, makoctl dismiss
bindd = SUPER SHIFT, PERIOD, Dismiss all, exec, makoctl dismiss -a
bindd = SUPER, D, Dictation, exec, /home/james/.local/bin/hypr-dictate
bindd = SUPER ALT, W, Wallpaper picker, exec, ~/.local/bin/wallpaper-picker
bindd = SUPER CTRL, D, Unblank displays, exec, ~/.local/bin/display-unblank
bindd = SUPER, C, Color picker, exec, hyprpicker -a

# ─── display blank submap ───
submap = blank
bind = , catchall, exec, ~/.local/bin/display-unblank
bind = SUPER, catchall, exec, ~/.local/bin/display-unblank
bind = CTRL, catchall, exec, ~/.local/bin/display-unblank
bind = ALT, catchall, exec, ~/.local/bin/display-unblank
bind = SHIFT, catchall, exec, ~/.local/bin/display-unblank
bind = SUPER CTRL, catchall, exec, ~/.local/bin/display-unblank
bind = SUPER ALT, catchall, exec, ~/.local/bin/display-unblank
bind = SUPER SHIFT, catchall, exec, ~/.local/bin/display-unblank
bind = CTRL ALT, catchall, exec, ~/.local/bin/display-unblank
bind = CTRL SHIFT, catchall, exec, ~/.local/bin/display-unblank
bind = ALT SHIFT, catchall, exec, ~/.local/bin/display-unblank
bind = , mouse:272, exec, ~/.local/bin/display-unblank
bind = , mouse:273, exec, ~/.local/bin/display-unblank
bind = , mouse_up, exec, ~/.local/bin/display-unblank
bind = , mouse_down, exec, ~/.local/bin/display-unblank
submap = reset
